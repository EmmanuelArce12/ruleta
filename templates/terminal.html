<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terminal de Canje Rápido</title>
    <style>
        body { font-family: Arial, sans-serif; background: #ecf0f1; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .header-terminal { width: 100%; background: #27ae60; color: white; padding: 15px 0; text-align: center; font-size: 20px; font-weight: bold; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-cerrar { position: absolute; right: 20px; top: 15px; background: #e74c3c; color: white; text-decoration: none; padding: 5px 15px; border-radius: 5px; font-size: 14px; }
        .caja-terminal { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; margin-top: 50px;}
        p { color: #7f8c8d; margin-bottom: 25px; }
        input { width: 90%; padding: 15px; margin-bottom: 15px; font-size: 20px; text-align: center; border: 2px solid #bdc3c7; border-radius: 5px; }
        input#input-token { text-transform: uppercase; font-family: monospace; letter-spacing: 2px; background-color: #fdfdfd; }
        input#input-pin { letter-spacing: 5px; background-color: #fdfdfd;}
        button { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219653; }
        #mensaje-alerta { margin-top: 20px; padding: 15px; border-radius: 5px; font-weight: bold; font-size: 16px; display: none; }
        .alerta-exito { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alerta-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
    <a href="/logout_terminal" style="position: absolute; top: 20px; right: 20px; background: #e74c3c; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; font-family: Arial, sans-serif; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">🚪 Salir de Terminal</a>
</head>
<body>

    

    <div class="caja-terminal">
        <h2 style="color: #2c3e50; margin-top:0;">Canjear Premio</h2>
        <p>Estación de Servicio</p>

        <input type="text" id="input-token" placeholder="CÓDIGO DEL CLIENTE" autocomplete="off">
        <input type="password" id="input-pin" placeholder="PIN DEL VENDEDOR" autocomplete="off">
        
        <button id="btn-canjear">VERIFICAR Y ENTREGAR</button>

        <div id="mensaje-alerta"></div>
    </div>

    <script>
        // Guardamos el ID de la estación protegida
        const ESTACION_ID = {{ estacion_id }};

        document.getElementById('btn-canjear').addEventListener('click', () => {
            const token = document.getElementById('input-token').value.trim();
            const pin = document.getElementById('input-pin').value.trim();
            const alerta = document.getElementById('mensaje-alerta');
            const btn = document.getElementById('btn-canjear');
            
            if(!token || !pin) {
                alerta.style.display = 'block';
                alerta.className = 'alerta-error';
                alerta.innerHTML = `⚠️ Faltan datos. Ingresa el código y el PIN.`;
                return;
            }

            btn.disabled = true;
            btn.innerText = "Procesando...";

            fetch(`/procesar_canje/${ESTACION_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, pin: pin })
            })
            .then(response => response.json())
            .then(data => {
                alerta.style.display = 'block';
                if(data.status === 'success') {
                    alerta.className = 'alerta-exito';
                    alerta.innerHTML = `✅ ${data.mensaje}<br><br><strong>ENTREGAR: ${data.premio}</strong><br>A: ${data.cliente}`;
                    document.getElementById('input-token').value = '';
                    document.getElementById('input-pin').value = '';
                } else {
                    alerta.className = 'alerta-error';
                    alerta.innerHTML = `❌ ${data.mensaje}`;
                }
                btn.disabled = false;
                btn.innerText = "VERIFICAR Y ENTREGAR";
            })
            .catch(error => {
                alerta.style.display = 'block';
                alerta.className = 'alerta-error';
                alerta.innerHTML = `❌ Error de conexión con el servidor.`;
                btn.disabled = false;
                btn.innerText = "VERIFICAR Y ENTREGAR";
            });
        });
    </script>
</body>
</html>
