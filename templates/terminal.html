<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Canje - {{ nombre_estacion }}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        
        .header { width: 100%; max-width: 400px; background: #005CAB; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box;}
        .header h1 { margin: 0; font-size: 18px; }
        .btn-logout { background: #e74c3c; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: bold; border: 1px solid #c0392b;}
        
        .card { background: white; padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border-top: 4px solid #27ae60; box-sizing: border-box;}
        
        h2 { color: #27ae60; margin-top: 0; font-size: 22px; margin-bottom: 5px;}
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;}
        input:focus { border-color: #27ae60; outline: none; }
        
        button { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);}
        button:hover { background: #219653; transform: translateY(-2px);}
        button:disabled { background: #ccc; cursor: not-allowed; transform: none;}
        
        #resultado { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; font-size: 16px; animation: fadeIn 0.3s;}
        .success { background: #eafaf1; color: #27ae60; border: 1px solid #27ae60; }
        .error { background: #fdedec; color: #e74c3c; border: 1px solid #e74c3c; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>POS: {{ nombre_estacion }}</h1>
        <a href="/logout_terminal" class="btn-logout">Salir</a>
    </div>

    <div class="card">
        <h2>Canjear Premio</h2>
        <p>Ingresa el código del cliente y tu PIN</p>
        
        <form id="form-canje">
            <input type="text" id="token" placeholder="CÓDIGO (Ej: A1B2C3)" required autocomplete="off" maxlength="6">
            <input type="password" id="pin" placeholder="TU PIN SECRETO" required pattern="[0-9]*" inputmode="numeric">
            <button type="submit" id="btn-submit">✅ Validar y Entregar</button>
        </form>
        
        <div id="resultado"></div>
    </div>

    <script>
        const ESTACION_ID = {{ estacion_id }};
        const form = document.getElementById("form-canje");
        const resultado = document.getElementById("resultado");
        const btn = document.getElementById("btn-submit");

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Procesando...";
            resultado.style.display = "none";
            resultado.className = "";

            const datos = {
                token: document.getElementById("token").value.toUpperCase(),
                pin: document.getElementById("pin").value
            };

            fetch(`/procesar_canje/${ESTACION_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
            .then(res => res.json())
            .then(data => {
                resultado.style.display = "block";
                if (data.status === "success") {
                    resultado.classList.add("success");
                    resultado.innerHTML = `🎉 ¡Éxito!<br>Entregar: <strong>${data.premio}</strong><br><small>A: ${data.cliente}</small>`;
                    form.reset(); // Limpia los campos
                } else {
                    resultado.classList.add("error");
                    resultado.innerHTML = `❌ Error: ${data.mensaje}`;
                }
            })
            .catch(() => {
                resultado.style.display = "block";
                resultado.classList.add("error");
                resultado.innerHTML = "❌ Error de conexión.";
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "✅ Validar y Entregar";
                document.getElementById("token").focus();
            });
        });
    </script>
</body>
</html>
