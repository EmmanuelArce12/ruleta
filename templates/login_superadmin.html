<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Maestro - SuperAdmin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #16213e; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; text-align: center; border-top: 5px solid #e94560;}
        h2 { color: #e94560; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 5px; font-size: 16px; background: #fff;}
        button { background: #e94560; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px;}
        button:hover { background: #c0392b; }
        .error { color: #fff; margin-bottom: 15px; font-weight: bold; background: #e74c3c; padding: 10px; border-radius: 5px;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Centro de Control Maestro</h2>
        <p style="color: #7f8c8d; margin-bottom: 25px;">Acceso restringido a dueños</p>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form action="/login_superadmin" method="POST">
            <input type="text" name="usuario" placeholder="Usuario Maestro" required autocomplete="off">
            <input type="password" name="password" placeholder="Contraseña Maestra" required>
            <button type="submit">INGRESAR AL SISTEMA</button>
        </form>
    </div>
</body>
</html>
