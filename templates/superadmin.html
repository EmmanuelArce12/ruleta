<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Maestro - Grupo GE</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e94560; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { margin: 0; color: #e94560; }
        .logout-btn { background: #e74c3c; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .logout-btn:hover { background: #c0392b; }
        .card { background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input { padding: 10px; margin-right: 10px; border-radius: 4px; border: none; }
        button { background: #e94560; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; color: #333; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #0f3460; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>👑 Centro de Control Maestro</h1>
        <a href="/logout_superadmin" class="logout-btn">🚪 Cerrar Sesión</a>
    </div>

    <div class="card">
        <h2 style="margin-top: 0;">➕ Crear Nueva Estación</h2>
        <form action="/superadmin/crear_estacion" method="POST">
            <input type="text" name="nombre" placeholder="Nombre de Estación (Ej: YPF Centro)" required>
            <input type="text" name="usuario" placeholder="Usuario Admin" required autocomplete="off">
            <input type="password" name="password" placeholder="Contraseña Admin" required>
            <button type="submit">Crear Estación</button>
        </form>
    </div>

    <div class="card" style="background: transparent; box-shadow: none; padding: 0;">
        <h2 style="color: #fff;">Estaciones Activas</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Usuario Admin</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for e in estaciones %}
                <tr>
                    <td>{{ e['id'] }}</td>
                    <td><strong>{{ e['nombre'] }}</strong></td>
                    <td>{{ e['admin_user'] }}</td>
                    <td style="display: flex; gap: 10px;">
                        <form action="/superadmin/blanquear_clave/{{ e['id'] }}" method="POST" style="margin: 0; display:flex;">
                            <input type="password" name="nueva_clave" placeholder="Nueva Clave" required style="padding: 6px; border: 1px solid #ccc;">
                            <button type="submit" style="background: #f1c40f; color: #333; padding: 6px 12px;">Resetear</button>
                        </form>
                        <form action="/superadmin/borrar_estacion/{{ e['id'] }}" method="POST" style="margin: 0;" onsubmit="return confirm('¿Seguro que deseas borrar esta estación y todos sus datos?');">
                            <button type="submit" style="background: #e74c3c; padding: 6px 12px;">Borrar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
