<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SaaS SuperAdmin - Gestor</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; margin: 0; padding: 30px; }
        .contenedor { max-width: 900px; margin: auto; background: #16213e; padding: 30px; border-radius: 10px; }
        h1 { color: #e94560; border-bottom: 2px solid #e94560; padding-bottom: 10px;}
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border:none; box-sizing:border-box;}
        button { background: #e94560; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: bold;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; color: black; border-radius: 5px; overflow: hidden;}
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #0f3460; color: white; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Centro de Control: SuperAdmin</h1>
        <form action="/superadmin/crear_estacion" method="POST">
            <input type="text" name="nombre" placeholder="Nombre Comercial (Ej: YPF GE Echeverría)" required>
            <input type="text" name="usuario" placeholder="Usuario Administrador (Ej: ge_admin)" required>
            <input type="password" name="password" placeholder="Contraseña Admin" required>
            <button type="submit" style="width:100%;">+ CREAR ESTACIÓN</button>
        </form>

        <h2 style="margin-top: 40px;">Estaciones Activas</h2>
        <table>
            <thead><tr><th>ID</th><th>Nombre</th><th>Usuario Admin</th><th>Acciones Rápidas</th></tr></thead>
            <tbody>
                {% for e in estaciones %}
                <tr>
                    <td>{{ e['id'] }}</td><td><strong>{{ e['nombre'] }}</strong></td><td>{{ e['admin_user'] }}</td>
                    <td>
                        <form action="/superadmin/blanquear_clave/{{ e['id'] }}" method="POST" style="display:inline-block;">
                            <input type="text" name="nueva_clave" placeholder="Nueva Clave" required style="width:100px; padding:5px;">
                            <button type="submit" style="background:#3498db; padding:5px;">Blanquear</button>
                        </form>
                        <form action="/superadmin/borrar_estacion/{{ e['id'] }}" method="POST" style="display:inline-block;">
                            <button type="submit" style="background:#e74c3c; padding:5px;" onclick="return confirm('¿Borrar todo permanentemente?');">Borrar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
