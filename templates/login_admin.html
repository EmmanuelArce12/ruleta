<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Administrador - Grupo GE</title>
    <style>
        body { font-family: Arial, sans-serif; background: #ecf0f1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; border-top: 5px solid #005CAB;}
        h2 { color: #005CAB; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 16px;}
        button { background: #005CAB; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px;}
        button:hover { background: #004280; }
        .error { color: #e74c3c; margin-bottom: 15px; font-weight: bold; background: #fadbd8; padding: 10px; border-radius: 5px;}
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Panel de Estación</h2>
        <p style="color: #7f8c8d; margin-bottom: 25px;">Ingrese con su cuenta de administrador</p>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form action="/login" method="POST">
            <input type="text" name="usuario" placeholder="Usuario Administrador" required autocomplete="off">
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">INICIAR SESIÓN</button>
        </form>
    </div>

</body>
</html>
