<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Ruleta - Grupo GE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; border-top: 5px solid #e67e22; box-sizing: border-box;}
        .icono { font-size: 40px; margin-bottom: 10px; }
        h2 { color: #333; margin-top: 0; margin-bottom: 5px; font-size: 22px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; transition: 0.3s;}
        input:focus { border-color: #e67e22; outline: none; }
        button { background: #e67e22; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s;}
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .error { color: white; background: #e74c3c; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; font-size: 14px;}
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icono">🎡</div> <h2>Pantalla de Juego</h2> <p>Ingresa las credenciales de la Tablet</p>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form action="/iniciar_ruleta" method="POST">
            <input type="text" name="usuario" placeholder="Usuario Operativo" required autocomplete="off">
            <input type="password" name="password" placeholder="Contraseña Operativa" required>
            <button type="submit">INICIAR PANTALLA</button>
        </form>
    </div>
</body>
</html>
