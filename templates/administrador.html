<div style="display: flex; gap: 20px; flex-wrap: wrap; width: 100%;">
            
            <div class="tarjeta">
                <h2 style="color: #e67e22; margin-top: 0; border-bottom: 2px solid #e67e22; padding-bottom: 10px; font-size: 18px;">🔐 Acceso Tablet</h2>
                <form action="/admin/configurar_ruleta" method="POST" style="background: #fff9e6; padding: 15px; border-radius: 8px; border: 1px solid #f39c12;">
                    <label style="font-weight: bold; color: #d35400; font-size: 13px;">Usuario:</label>
                    <input type="text" name="ruleta_user" value="{{ estacion['ruleta_user'] or '' }}" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box;">
                    <label style="font-weight: bold; color: #d35400; font-size: 13px;">Contraseña:</label>
                    <input type="text" name="ruleta_pass" value="{{ estacion['ruleta_pass'] or '' }}" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box;">
                    <button type="submit" class="btn-accion btn-verde" style="width: 100%;">💾 Guardar</button>
                </form>
            </div>

            <div class="tarjeta">
                <h2 style="color: #2980b9; margin-top: 0; border-bottom: 2px solid #2980b9; padding-bottom: 10px; font-size: 18px; display: flex; align-items: center;">
                    ✉️ Correo <button class="btn-ayuda" type="button" onclick="document.getElementById('ayuda-gmail').style.display = document.getElementById('ayuda-gmail').style.display === 'block' ? 'none' : 'block'">?</button>
                </h2>
                <div id="ayuda-gmail" class="caja-ayuda">
                    <strong>¿Cómo obtener la clave?</strong>
                    <ol style="margin-top: 5px; padding-left: 20px;">
                        <li>Entra a la cuenta de Gmail.</li>
                        <li>Gestionar cuenta > Seguridad.</li>
                        <li>Verificación en dos pasos.</li>
                        <li>Contraseñas de aplicaciones.</li>
                    </ol>
                </div>
                <form action="/admin/configurar_correo" method="POST" style="background: #f4f9fd; padding: 15px; border-radius: 8px; border: 1px solid #3498db; margin-top: 10px;">
                    <label style="font-weight: bold; color: #2980b9; font-size: 13px;">Gmail:</label>
                    <input type="email" name="correo" value="{{ estacion['correo_emisor'] or '' }}" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box;">
                    <label style="font-weight: bold; color: #2980b9; font-size: 13px;">Clave (16 letras):</label>
                    <input type="password" name="password_correo" value="{{ estacion['password_correo'] or '' }}" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box;">
                    <button type="submit" class="btn-accion btn-azul" style="width: 100%;">💾 Guardar</button>
                </form>
            </div>

            <div class="tarjeta">
                <h2 style="color: #8e44ad; margin-top: 0; border-bottom: 2px solid #8e44ad; padding-bottom: 10px; font-size: 18px;">🎨 Diseño ({{ estacion['bandera'] }})</h2>
                <form action="/admin/configurar_estilo" method="POST" style="background: #f9f4ff; padding: 15px; border-radius: 8px; border: 1px solid #8e44ad; margin-top: 10px;">
                    <label style="font-weight: bold; color: #8e44ad; font-size: 13px;">Seleccionar Tema Visual:</label>
                    <select name="estilo_ruleta" style="width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px;">
                        
                        {% if estacion['bandera'] == 'YPF' %}
                            <option value="YPF_CLASICO" {% if estacion['estilo_ruleta'] == 'YPF_CLASICO' %}selected{% endif %}>YPF: Clásico (Azul y Amarillo)</option>
                            <option value="YPF_MODERNO" {% if estacion['estilo_ruleta'] == 'YPF_MODERNO' %}selected{% endif %}>YPF: Moderno (Carbono y Vidrio)</option>
                        {% elif estacion['bandera'] == 'AXION' %}
                            <option value="AXION_CLASICO" {% if estacion['estilo_ruleta'] == 'AXION_CLASICO' %}selected{% endif %}>Axion: Clásico (Violeta y Rojo)</option>
                            <option value="AXION_PREMIUM" {% if estacion['estilo_ruleta'] == 'AXION_PREMIUM' %}selected{% endif %}>Axion: Premium (Luces LED Oro)</option>
                        {% endif %}

                    </select>
                    <button type="submit" class="btn-accion" style="background: #8e44ad; color: white; width: 100%;">💾 Aplicar Diseño</button>
                </form>
            </div>
        </div>
