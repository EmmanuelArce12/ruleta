<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desbloquear Terminal POS</title>
    <style>
        body { font-family: Arial; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; text-align: center; border-top: 5px solid #27ae60;}
        h2 { color: #27ae60; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border: 2px solid #ccc; border-radius: 5px; font-size: 18px;}
        button { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; font-size:18px; border-radius: 5px; cursor: pointer; }
        .error { color: #e74c3c; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Terminal de Canje</h2>
        <p style="color: #7f8c8d;">Ingrese las credenciales de la estación para habilitar la caja.</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form action="/iniciar_terminal" method="POST">
            <input type="text" name="usuario" placeholder="Usuario Estación" required autocomplete="off">
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">HABILITAR TERMINAL</button>
        </form>
    </div>
</body>
</html>
